<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medicijnkluis / Medicine Vault</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0d0d3b;
    --navy-mid: #12125a;
    --lavender: #8585c8;
    --lavender-light: #a8a8d8;
    --lavender-btn: #7878be;
    --white: #ffffff;
    --gray-input: #d0d0d8;
    --gray-text: #1a1a2e;
    --accent: #5555aa;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    color: var(--white);
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
  }

  /* ── PAGES ── */
  .page {
    display: none;
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0; left: 0;
    flex-direction: column;
    animation: fadeIn 0.35s ease;
  }
  .page.active { display: flex; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── WELCOME ── */
  #page-welcome {
    align-items: flex-start;
    justify-content: center;
    padding: 48px 60px;
    gap: 32px;
    cursor: pointer;
  }
  .welcome-hero {
    background: var(--lavender);
    padding: 40px 50px 34px;
    border-radius: 6px;
    max-width: 600px;
  }
  .welcome-hero h1 {
    font-family: 'DM Sans', sans-serif;
    font-size: clamp(56px, 9vw, 80px);
    font-weight: 400;
    line-height: 1;
    color: var(--white);
  }
  .welcome-hero p {
    font-size: clamp(18px, 2.4vw, 24px);
    font-weight: 300;
    letter-spacing: 0.08em;
    color: var(--white);
    margin-top: 10px;
  }
  .welcome-proceed {
    font-size: clamp(20px, 2.6vw, 28px);
    font-weight: 300;
    letter-spacing: 0.1em;
    color: var(--lavender-light);
    transition: color 0.2s;
    margin-top: 12px;
    padding-left: 6px;
  }
  .welcome-proceed:hover { color: var(--white); }

  /* Language flag */
  .lang-switch {
    position: absolute;
    top: 28px; right: 36px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    opacity: 0.85;
    transition: opacity 0.2s;
  }
  .lang-switch:hover { opacity: 1; }
  .lang-switch img {
    border-radius: 4px;
    /* box-shadow: 0 2px 6px rgba(0,0,0,0.25); */
  }
  .lang-label {
    font-size: 14px;
    letter-spacing: 0.05em;
    color: var(--lavender-light);
    text-align: center;
    line-height: 1.4;
  }
  .inner-page {
    display: flex;
    flex-direction: column;
    width: 100%;
    height: 100%;
    padding: 0;
    overflow-y: auto;
  }
  .page-header {
    background: var(--lavender);
    padding: 24px 36px;
    font-family: 'DM Sans', sans-serif;
    font-size: clamp(28px, 4vw, 38px);
    font-weight: 400;
    color: var(--white);
    letter-spacing: 0.02em;
  }
  .page-body {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px;
    gap: 40px;
  }

  /* ── BACK ARROW ── */
  .back-btn {
    position: absolute;
    bottom: 32px;
    left: 32px;
    width: 0;
    height: 0;
    border-style: solid;
    border-width: 26px 44px 26px 0;
    border-color: transparent var(--white) transparent transparent;
    cursor: pointer;
    opacity: 0.75;
    transition: opacity 0.2s;
  }
  .back-btn:hover { opacity: 1; }

  /* ── OPTION BUTTONS ── */
  .option-btn {
    background: var(--lavender-btn);
    border: none;
    border-radius: 6px;
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: clamp(22px, 3vw, 30px);
    font-weight: 300;
    letter-spacing: 0.08em;
    line-height: 1.4;
    padding: 36px 40px;
    min-width: 240px;
    min-height: 190px;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    text-align: left;
  }
  .option-btn:hover {
    background: var(--lavender);
    transform: translateY(-3px);
  }
  .option-btn:active { transform: translateY(0); }

  /* ── PINCODE PAGE ── */
  .pin-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    width: 100%;
    max-width: 380px;
  }
  .pin-label {
    background: var(--lavender);
    width: 100%;
    padding: 12px 20px;
    font-size: clamp(18px, 2.4vw, 24px);
    font-weight: 400;
    border-radius: 4px;
    letter-spacing: 0.05em;
  }
  .pin-display {
    background: var(--gray-input);
    width: 100%;
    height: 48px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 10px;
  }
  .pin-dot {
    width: 16px; height: 16px;
    background: var(--navy);
    border-radius: 50%;
    display: none;
  }
  .pin-dot.filled { display: block; }
  .pin-grid {
    background: var(--lavender-btn);
    border-radius: 6px;
    padding: 12px 16px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    width: 100%;
  }
  .pin-key {
    background: none;
    border: none;
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: clamp(22px, 2.8vw, 28px);
    font-weight: 400;
    cursor: pointer;
    padding: 12px 0;
    text-align: center;
    border-radius: 4px;
    transition: background 0.15s;
  }
  .pin-key:hover { background: rgba(255,255,255,0.15); }
  .pin-key.del { font-size: 18px; letter-spacing: 0.05em; }
  .pin-key.confirm {
    background: rgba(255,255,255,0.12);
    font-size: 16px;
    letter-spacing: 0.08em;
  }
  .pin-key.confirm:hover { background: rgba(255,255,255,0.25); }

  /* ── BIRTHDATE PAGE ── */
  .date-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    width: 100%;
    max-width: 400px;
  }
  .date-label {
    background: var(--lavender);
    width: 100%;
    padding: 12px 20px;
    font-size: clamp(18px, 2.4vw, 24px);
    border-radius: 4px;
    letter-spacing: 0.05em;
  }
  .date-inputs {
    display: flex;
    gap: 10px;
    width: 100%;
    align-items: center;
  }
  .date-field {
    background: var(--gray-input);
    border: none;
    border-radius: 4px;
    color: var(--gray-text);
    font-family: 'DM Sans', sans-serif;
    font-size: clamp(22px, 2.8vw, 28px);
    text-align: center;
    padding: 12px 8px;
    outline: none;
    font-weight: 500;
  }
  .date-field.day, .date-field.month { width: 80px; }
  .date-field.year { width: 115px; }
  .date-sep { font-size: 26px; color: var(--lavender-light); }
  .date-numpad {
    background: var(--lavender-btn);
    border-radius: 6px;
    padding: 12px 16px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    width: 100%;
  }
  .date-key {
    background: none;
    border: none;
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: clamp(22px, 2.8vw, 26px);
    cursor: pointer;
    padding: 10px 0;
    text-align: center;
    border-radius: 4px;
    transition: background 0.15s;
  }
  .date-key:hover { background: rgba(255,255,255,0.15); }
  .date-key.del { font-size: 16px; }
  .date-submit {
    width: 100%;
    background: var(--lavender);
    border: none;
    border-radius: 4px;
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 22px;
    letter-spacing: 0.1em;
    padding: 18px;
    cursor: pointer;
    transition: background 0.2s;
    font-weight: 400;
  }
  .date-submit:hover { background: var(--accent); }

  /* ── QR PAGE ── */
  .qr-box {
    background: var(--gray-input);
    border-radius: 6px;
    padding: 32px 48px;
    font-size: clamp(22px, 2.8vw, 28px);
    color: var(--gray-text);
    letter-spacing: 0.06em;
    line-height: 1.5;
    max-width: 600px;
    text-align: left;
  }

  /* ── DISPENSING PAGE ── */
  .dispensing-body {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 36px;
    padding: 48px 40px;
  }
  .dispensing-msg {
    background: var(--gray-input);
    border-radius: 6px;
    padding: 26px 42px;
    font-size: clamp(24px, 3vw, 30px);
    color: var(--gray-text);
    letter-spacing: 0.05em;
    text-align: center;
    max-width: 620px;
  }
  .dots {
    display: flex;
    gap: 20px;
    margin-top: 12px;
  }
  .dot {
    width: 14px; height: 14px;
    background: var(--white);
    border-radius: 50%;
    animation: pulse 1.4s ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  .dot:nth-child(4) { animation-delay: 0.6s; }
  .dot:nth-child(5) { animation-delay: 0.8s; }
  @keyframes pulse {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.85); }
    40% { opacity: 1; transform: scale(1); }
  }

  /* ── END PAGE ── */
  .end-body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    padding: 48px 40px;
  }
  .end-msg {
    background: var(--gray-input);
    border-radius: 6px;
    padding: 32px 48px;
    font-size: clamp(20px, 2.8vw, 28px);
    color: var(--gray-text);
    letter-spacing: 0.04em;
    text-align: center;
    max-width: 620px;
    line-height: 1.5;
    font-weight: 400;
  }
  .end-farewell {
    background: var(--gray-input);
    border-radius: 6px;
    padding: 32px 48px;
    font-size: clamp(22px, 3.2vw, 32px);
    color: var(--gray-text);
    letter-spacing: 0.05em;
    text-align: center;
    max-width: 620px;
    line-height: 1.6;
    font-weight: 400;
  }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════ -->
<!-- PAGE: WELCOME -->
<!-- ═══════════════════════════════════════════════ -->
<div id="page-welcome" class="page active">
  <div class="inner-page" onclick="goTo('page-login')">
    <div style="flex:1; display:flex; flex-direction:column; justify-content:center; padding:60px 80px; gap:40px;">
      <div class="welcome-hero">
        <h1 id="w-title">Welkom</h1>
        <p id="w-sub">bij de medicijnkluis</p>
      </div>
      <div class="welcome-proceed" id="w-proceed">
        klik om door te gaan
      </div>
    </div>
  </div>

  <!-- Language switcher -->
  <div class="lang-switch" onclick="toggleLang()">
    <img id="flag-display" src="https://img.icons8.com/emoji/48/netherlands-emoji.png" alt="netherlands-emoji">
    <div class="lang-label" id="lang-label">click here<br>for english</div>
  </div>
</div>

<!-- PAGE: END -->
<div id="page-end" class="page">
  <div class="inner-page">
    <div class="page-header" id="end-header"></div>
    <div class="page-body end-body">
      <div class="end-msg" id="end-msg"></div>
      <div class="end-farewell" id="end-farewell"></div>
    </div>
  </div>
  <div class="back-btn" onclick="goTo('page-welcome')"></div>
</div>
<!-- ═══════════════════════════════════════════════ -->
<!-- PAGE: LOGIN CHOICE (Manual / QR) -->
<!-- ═══════════════════════════════════════════════ -->
<div id="page-login" class="page">
  <div class="inner-page">
    <div class="page-header" id="login-header">Aanmelden</div>
    <div class="page-body">
      <button class="option-btn" onclick="goTo('page-manual')" id="btn-manual">inloggen<br>handmatig</button>
      <button class="option-btn" onclick="goTo('page-qr')" id="btn-qr">inloggen<br>Qr-code</button>
    </div>
  </div>
  <div class="back-btn" onclick="goTo('page-welcome')"></div>
</div>

<!-- ═══════════════════════════════════════════════ -->
<!-- PAGE: MANUAL LOGIN CHOICE (Pin / Birthdate) -->
<!-- ═══════════════════════════════════════════════ -->
<div id="page-manual" class="page">
  <div class="inner-page">
    <div class="page-header" id="manual-header">Handmatig inloggen</div>
    <div class="page-body">
      <button class="option-btn" onclick="goTo('page-pin')" id="btn-pin">inloggen<br>met<br>pincode</button>
      <button class="option-btn" onclick="goTo('page-date')" id="btn-date">inloggen<br>met<br>geboortedatum</button>
    </div>
  </div>
  <div class="back-btn" onclick="goTo('page-login')"></div>
</div>

<!-- ═══════════════════════════════════════════════ -->
<!-- PAGE: PINCODE -->
<!-- ═══════════════════════════════════════════════ -->
<div id="page-pin" class="page">
  <div class="inner-page">
    <div class="page-header" id="pin-header">Pincode invoeren</div>
    <div class="page-body">
      <div class="pin-wrapper">
        <div class="pin-label" id="pin-label">Vul uw pincode in</div>
        <div class="pin-display" id="pin-display"></div>
        <div class="pin-grid">
          <button class="pin-key" onclick="pinKey('1')">1</button>
          <button class="pin-key" onclick="pinKey('2')">2</button>
          <button class="pin-key" onclick="pinKey('3')">3</button>
          <button class="pin-key" onclick="pinKey('4')">4</button>
          <button class="pin-key" onclick="pinKey('5')">5</button>
          <button class="pin-key" onclick="pinKey('6')">6</button>
          <button class="pin-key" onclick="pinKey('7')">7</button>
          <button class="pin-key" onclick="pinKey('8')">8</button>
          <button class="pin-key" onclick="pinKey('9')">9</button>
          <button class="pin-key del" onclick="pinDel()" id="pin-del-btn">⌫</button>
          <button class="pin-key" onclick="pinKey('0')">0</button>
          <button class="pin-key confirm" onclick="pinConfirm()" id="pin-ok-btn">OK</button>
        </div>
      </div>
    </div>
  </div>
  <div class="back-btn" onclick="goTo('page-manual'); pinReset()"></div>
</div>

<!-- ═══════════════════════════════════════════════ -->
<!-- PAGE: BIRTHDATE -->
<!-- ═══════════════════════════════════════════════ -->
<div id="page-date" class="page">
  <div class="inner-page">
    <div class="page-header" id="date-header">Geboortedatum invoeren</div>
    <div class="page-body">
      <div class="date-wrapper">
        <div class="date-label" id="date-label">Vul uw geboortedatum in</div>
        <div class="date-inputs">
          <input class="date-field day" id="date-dd" maxlength="2" placeholder="DD" readonly>
          <span class="date-sep">/</span>
          <input class="date-field month" id="date-mm" maxlength="2" placeholder="MM" readonly>
          <span class="date-sep">/</span>
          <input class="date-field year" id="date-yyyy" maxlength="4" placeholder="YYYY" readonly>
        </div>
        <div class="date-numpad">
          <button class="date-key" onclick="dateKey('1')">1</button>
          <button class="date-key" onclick="dateKey('2')">2</button>
          <button class="date-key" onclick="dateKey('3')">3</button>
          <button class="date-key" onclick="dateKey('4')">4</button>
          <button class="date-key" onclick="dateKey('5')">5</button>
          <button class="date-key" onclick="dateKey('6')">6</button>
          <button class="date-key" onclick="dateKey('7')">7</button>
          <button class="date-key" onclick="dateKey('8')">8</button>
          <button class="date-key" onclick="dateKey('9')">9</button>
          <button class="date-key del" onclick="dateDel()">⌫</button>
          <button class="date-key" onclick="dateKey('0')">0</button>
          <button class="date-key confirm" onclick="dateConfirm()" style="font-size:14px;letter-spacing:0.08em;background:rgba(255,255,255,0.12)">OK</button>
        </div>
      </div>
    </div>
  </div>
  <div class="back-btn" onclick="goTo('page-manual'); dateReset()"></div>
</div>

<!-- ═══════════════════════════════════════════════ -->
<!-- PAGE: QR CODE -->
<!-- ═══════════════════════════════════════════════ -->
<div id="page-qr" class="page">
  <div class="inner-page">
    <div class="page-header" id="qr-header">QR-code scannen</div>
    <div class="page-body">
      <div class="qr-box" id="qr-msg">Plaats uw QR-code voor de scanner</div>
    </div>
  </div>
  <div class="back-btn" onclick="goTo('page-login')"></div>
</div>

<!-- ═══════════════════════════════════════════════ -->
<!-- PAGE: DISPENSING / INCOMING MEDICINE -->
<!-- ═══════════════════════════════════════════════ -->
<div id="page-dispensing" class="page">
  <div class="inner-page">
    <div class="page-header" id="disp-header">Medicijnen komen</div>
    <div class="page-body dispensing-body">
      <div class="dispensing-msg" id="disp-msg">Wacht tot de deur opengaat</div>
      <div class="dots">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        <div class="dot"></div><div class="dot"></div>
      </div>
    </div>
  </div>
  <div class="back-btn" onclick="goTo('page-welcome')"></div>
</div>

<script>
// ── STATE ──
let lang = 'nl';
let pinValue = '';
let dateBuffer = '';   // flat string DDMMYYYY

// ── TRANSLATIONS ──
const T = {
  nl: {
    wTitle: 'Welkom',
    wSub: 'bij de medicijnkluis',
    wProceed: 'klik om door te gaan',
    flagLabel: 'click here for\nenglish',
    loginHeader: 'Aanmelden',
    btnManual: 'inloggen\nhandmatig',
    btnQr: 'inloggen\nQr-code',
    manualHeader: 'Handmatig inloggen',
    btnPin: 'inloggen met\npincode',
    btnDate: 'inloggen met\ngeboortedatum',
    pinHeader: 'Pincode invoeren',
    pinLabel: 'Vul uw pincode in',
    dateHeader: 'Geboortedatum invoeren',
    dateLabel: 'Vul uw geboortedatum in',
    qrHeader: 'QR-code scannen',
    qrMsg: 'Plaats uw QR-code voor de scanner',
    dispHeader: 'Medicijnen komen',
    dispMsg: 'Wacht tot de deur opengaat',
  },
  en: {
    wTitle: 'Welcome',
    wSub: 'to the medicine vault',
    wProceed: 'click to proceed',
    flagLabel: 'klik hier voor\nnederlands',
    loginHeader: 'Log in',
    btnManual: 'login\nmanually',
    btnQr: 'login\nQR code',
    manualHeader: 'Manual login',
    btnPin: 'login with\npincode',
    btnDate: 'login with\ndate of birth',
    pinHeader: 'Enter pincode',
    pinLabel: 'Enter your pincode',
    dateHeader: 'Enter date of birth',
    dateLabel: 'Enter your date of birth',
    qrHeader: 'QR code scan',
    qrMsg: 'Place your QR code in front of the scanner',
    dispHeader: 'Incoming medicine',
    dispMsg: 'Wait until the door opens',
  }
};

function applyLang() {
  const t = T[lang];
  document.getElementById('w-title').textContent = t.wTitle;
  document.getElementById('w-sub').textContent = t.wSub;
  document.getElementById('w-proceed').textContent = t.wProceed;
  document.getElementById('lang-label').innerHTML = t.flagLabel.replace('\n','<br>');
  document.getElementById('login-header').textContent = t.loginHeader;
  document.getElementById('btn-manual').innerHTML = t.btnManual.replace(/\n/g,'<br>');
  document.getElementById('btn-qr').innerHTML = t.btnQr.replace(/\n/g,'<br>');
  document.getElementById('manual-header').textContent = t.manualHeader;
  document.getElementById('btn-pin').innerHTML = t.btnPin.replace(/\n/g,'<br>');
  document.getElementById('btn-date').innerHTML = t.btnDate.replace(/\n/g,'<br>');
  document.getElementById('pin-header').textContent = t.pinHeader;
  document.getElementById('pin-label').textContent = t.pinLabel;
  document.getElementById('date-header').textContent = t.dateHeader;
  document.getElementById('date-label').textContent = t.dateLabel;
  document.getElementById('qr-header').textContent = t.qrHeader;
  document.getElementById('qr-msg').textContent = t.qrMsg;
  document.getElementById('disp-header').textContent = t.dispHeader;
  document.getElementById('disp-msg').textContent = t.dispMsg;

  // Update flag
  const fd = document.getElementById('flag-display');
  if (lang === 'nl') {
    fd.src = 'https://img.icons8.com/emoji/48/netherlands-emoji.png';
  } else {
    fd.src = 'https://img.icons8.com/emoji/48/united-kingdom-emoji.png';
  }

  // End page texts (language dependent)
  const endHeader = document.getElementById('end-header');
  const endMsg = document.getElementById('end-msg');
  const endFarewell = document.getElementById('end-farewell');
  if (endHeader) {
    endHeader.textContent = (lang === 'nl') ? 'Bedankt voor uw komst' : 'Thank you for visiting';
  }
  if (endMsg) {
    endMsg.textContent = (lang === 'nl') ? 'Zorg dat u al uw medicijnen uit het vak heeft gehaald!' : 'Make sure to take all your medicine from the compartment!';
  }
  if (endFarewell) {
    endFarewell.textContent = (lang === 'nl') ? 'Tot ziens!' : 'Goodbye!';
  }
}

function toggleLang() {
  lang = lang === 'nl' ? 'en' : 'nl';
  applyLang();
}

// ── NAVIGATION ──
let autoAdvanceTimer = null;

function goTo(id) {
  if (autoAdvanceTimer) { clearTimeout(autoAdvanceTimer); autoAdvanceTimer = null; }
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'page-dispensing') {
    autoAdvanceTimer = setTimeout(() => { goTo('page-end'); }, 10000);
  }
}

// ── PIN LOGIC ──
function pinRender() {
  const d = document.getElementById('pin-display');
  d.innerHTML = '';
  for (let i = 0; i < 6; i++) {
    const dot = document.createElement('div');
    dot.className = 'pin-dot' + (i < pinValue.length ? ' filled' : '');
    d.appendChild(dot);
  }
}

function pinKey(k) {
  if (pinValue.length < 6) {
    pinValue += k;
    pinRender();
  }
}

function pinDel() {
  pinValue = pinValue.slice(0, -1);
  pinRender();
}

function pinConfirm() {
  if (pinValue.length > 0) {
    goTo('page-dispensing');
    pinReset();
  }
}

function pinReset() {
  pinValue = '';
  pinRender();
}

pinRender();

// ── DATE LOGIC ──
function dateFields() {
  const dd = dateBuffer.slice(0, 2).padEnd(2, '_');
  const mm = dateBuffer.slice(2, 4).padEnd(2, '_');
  const yyyy = dateBuffer.slice(4, 8).padEnd(4, '_');
  document.getElementById('date-dd').value = dd === '__' ? '' : dd.replace(/_/g, '');
  document.getElementById('date-mm').value = mm === '__' ? '' : mm.replace(/_/g, '');
  document.getElementById('date-yyyy').value = yyyy === '____' ? '' : yyyy.replace(/_/g, '');
  document.getElementById('date-dd').placeholder = 'DD';
  document.getElementById('date-mm').placeholder = 'MM';
  document.getElementById('date-yyyy').placeholder = 'YYYY';
}

function dateKey(k) {
  if (dateBuffer.length < 8) {
    dateBuffer += k;
    dateFields();
  }
}

function dateDel() {
  dateBuffer = dateBuffer.slice(0, -1);
  dateFields();
}

function dateConfirm() {
  if (dateBuffer.length === 8) {
    goTo('page-dispensing');
    dateReset();
  }
}

function dateReset() {
  dateBuffer = '';
  dateFields();
}

// Simulate QR scan after 3 seconds on QR page
document.getElementById('page-qr').addEventListener('click', function() {
  goTo('page-dispensing');
});

applyLang();
</script>
</body>
