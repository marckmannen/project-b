<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Medicijnkluis</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #1a1f5e;
      --navy-dark: #12164a;
      --lavender: #8b90c8;
      --lavender-box: rgba(139,144,200,0.55);
      --lavender-card: rgba(139,144,200,0.18);
      --lavender-card-active: rgba(139,144,200,0.38);
      --text: #ffffff;
      --text-dim: rgba(255,255,255,0.65);
      --red: #ae1c28;
      --white: #ffffff;
      --blue: #21468b;
      --sans: 'Raleway', sans-serif;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--navy);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Language switcher (top right) ── */
    .lang-switcher {
      position: fixed;
      top: 1.4rem;
      right: 1.8rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.45rem;
      z-index: 10;
    }

    .flag {
      width: 48px;
      height: 32px;
      border-radius: 2px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      cursor: pointer;
      box-shadow: 0 1px 6px rgba(0,0,0,0.4);
    }

    .flag .stripe { flex: 1; }
    .flag .s-red   { background: var(--red); }
    .flag .s-white { background: var(--white); }
    .flag .s-blue  { background: var(--blue); }

    .lang-label {
      font-size: 0.62rem;
      font-weight: 400;
      letter-spacing: 0.06em;
      color: var(--text-dim);
      text-align: center;
      line-height: 1.3;
      cursor: pointer;
    }

    /* ── Welcome / splash screen ── */
    #splash {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 3rem 4rem;
      cursor: pointer;
      user-select: none;
      position: relative;
    }

    .welcome-box {
      background: var(--lavender-box);
      display: inline-block;
      padding: 1.6rem 2.4rem 1.8rem;
      margin-bottom: 3.5rem;
      max-width: 520px;
    }

    .welcome-box h1 {
      font-size: clamp(2.8rem, 6vw, 4rem);
      font-weight: 300;
      letter-spacing: 0.04em;
      line-height: 1;
      margin-bottom: 0.4rem;
    }

    .welcome-box p {
      font-size: clamp(0.95rem, 2vw, 1.25rem);
      font-weight: 400;
      letter-spacing: 0.12em;
    }

    .click-prompt {
      font-size: clamp(0.9rem, 1.8vw, 1.15rem);
      font-weight: 400;
      letter-spacing: 0.25em;
      color: var(--text-dim);
      padding-left: 0.5rem;
    }

    /* ── Control panel (hidden until splash clicked) ── */
    #panel {
      display: none;
      flex-direction: column;
      flex: 1;
      padding: 2.5rem 3rem 3rem;
    }

    .panel-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 2.2rem;
    }

    .panel-title {
      font-size: 1.6rem;
      font-weight: 300;
      letter-spacing: 0.12em;
    }

    .panel-title span {
      display: block;
      font-size: 0.7rem;
      letter-spacing: 0.22em;
      color: var(--text-dim);
      margin-bottom: 0.3rem;
      font-weight: 400;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      color: var(--text-dim);
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text-dim);
      transition: background 0.3s;
    }
    .dot.online {
      background: #6effc4;
      box-shadow: 0 0 6px #6effc4;
      animation: blink 2.4s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1rem;
      margin-bottom: 1.8rem;
    }

    /* ── Card ── */
    .card {
      background: var(--lavender-card);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 1.4rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      position: relative;
    }

    .card:hover {
      background: var(--lavender-card-active);
    }

    .card.active {
      background: var(--lavender-card-active);
      border-color: rgba(255,255,255,0.3);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .card-id {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 0.25rem;
    }

    .card-name {
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .state-tag {
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      font-weight: 600;
      padding: 0.18rem 0.5rem;
      border: 1px solid rgba(255,255,255,0.2);
      color: var(--text-dim);
      transition: all 0.2s;
    }

    .card.active .state-tag {
      border-color: rgba(255,255,255,0.6);
      color: var(--text);
    }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 0.7rem;
    }

    /* pill toggle */
    .pill {
      width: 44px; height: 24px;
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      position: relative;
      transition: background 0.25s;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .card.active .pill {
      background: rgba(110,255,196,0.35);
      border-color: rgba(110,255,196,0.5);
    }
    .pill::after {
      content: '';
      position: absolute;
      top: 3px; left: 3px;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: rgba(255,255,255,0.45);
      transition: transform 0.25s, background 0.25s;
    }
    .card.active .pill::after {
      transform: translateX(20px);
      background: #6effc4;
    }

    .toggle-label {
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      color: var(--text-dim);
    }
    .card.active .toggle-label { color: var(--text); }

    /* ── Bottom bar ── */
    .bottom-bar {
      display: flex;
      gap: 0.75rem;
      justify-content: space-between;
      align-items: center;
    }

    .back-btn, .all-off-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.18);
      color: var(--text-dim);
      font-family: var(--sans);
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      padding: 0.55rem 1.1rem;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
    }
    .back-btn:hover { border-color: rgba(255,255,255,0.5); color: var(--text); }
    .all-off-btn:hover { border-color: rgba(255,100,100,0.5); color: #ff8888; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(70px);
      background: var(--lavender-card-active);
      border: 1px solid rgba(255,255,255,0.2);
      color: var(--text);
      font-family: var(--sans);
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      padding: 0.55rem 1.3rem;
      border-radius: 0;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 100;
      white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.ok { border-color: rgba(110,255,196,0.5); color: #6effc4; }
    #toast.err { border-color: rgba(255,100,100,0.4); color: #ff9999; }
  </style>
</head>
<body>

<!-- Language switcher -->
<div class="lang-switcher" onclick="toggleLang()">
  <div class="flag">
    <div class="stripe s-red"></div>
    <div class="stripe s-white"></div>
    <div class="stripe s-blue"></div>
  </div>
  <div class="lang-label" id="lang-label">klik hier<br>voor english</div>
</div>

<!-- Splash / welcome screen -->
<div id="splash" onclick="enterPanel()">
  <div class="welcome-box">
    <h1 id="welcome-h1">welkom</h1>
    <p id="welcome-sub">bij de Medicijnkluis</p>
  </div>
  <div class="click-prompt" id="click-prompt">klik om door te gaan</div>
</div>

<!-- Control panel -->
<div id="panel">
  <div class="panel-header">
    <div class="panel-title">
      <span id="panel-main-label">Medicijnkluis</span>
    </div>
    <!-- <div class="status-pill">
      <div class="dot" id="conn-dot"></div>
      <span id="conn-label">verbinden...</span>
    </div> -->
  </div>

  <div class="grid" id="grid"></div>

  <div class="bottom-bar">
    <button class="back-btn" onclick="goBack()" id="back-btn">← terug</button>
    <button class="all-off-btn" onclick="allOff()" id="all-off-btn">alles uit</button>
  </div>
</div>

<div id="toast"></div>

<script>
  const API = "";
  let lang = "nl";

  const strings = {
    nl: {
      welcome: "welkom",
      sub: "bij de Medicijnkluis",
      prompt: "klik om door te gaan",
      langLabel: "klik hier\nvoor english",
      panelSub: "CONTROLEPANEEL",
      panelMain: "Medicijnkluis",
      connecting: "verbinden...",
      connected: "verbonden",
      offline: "offline",
      back: "← terug",
      allOff: "alles uit",
      on: "AAN",
      off: "UIT",
      turnOn: "inschakelen",
      turnOff: "uitschakelen",
    },
    en: {
      welcome: "welcome",
      sub: "to the medicine cabinet",
      prompt: "click to continue",
      langLabel: "click here\nfor dutch",
      panelSub: "CONTROL PANEL",
      panelMain: "medicine cabinet",
      connecting: "connecting...",
      connected: "connected",
      offline: "offline",
      back: "← back",
      allOff: "all off",
      on: "ON",
      off: "OFF",
      turnOn: "turn on",
      turnOff: "turn off",
    }
  };

  function t(key) { return strings[lang][key]; }

  function toggleLang() {
    lang = lang === "nl" ? "en" : "nl";
    applyLang();
  }

  function applyLang() {
    const s = strings[lang];
    document.getElementById("welcome-h1").textContent = s.welcome;
    document.getElementById("welcome-sub").textContent = s.sub;
    document.getElementById("click-prompt").textContent = s.prompt;
    document.getElementById("lang-label").innerHTML = s.langLabel.replace("\n","<br>");
    document.getElementById("panel-sub-label").textContent = s.panelSub;
    document.getElementById("panel-main-label").textContent = s.panelMain;
    document.getElementById("back-btn").textContent = s.back;
    document.getElementById("all-off-btn").textContent = s.allOff;
    const connEl = document.getElementById("conn-label");
    const dot = document.getElementById("conn-dot");
    if (dot.classList.contains("online")) connEl.textContent = s.connected;
    else connEl.textContent = s.offline;
    // re-render cards if panel is open
    if (document.getElementById("panel").style.display !== "none") fetchStatus();
  }

  function enterPanel() {
    document.getElementById("splash").style.display = "none";
    document.getElementById("panel").style.display = "flex";
    fetchStatus();
  }

  function goBack() {
    document.getElementById("panel").style.display = "none";
    document.getElementById("splash").style.display = "flex";
  }

  async function fetchStatus() {
    try {
      const res = await fetch(`${API}/api/status`);
      const data = await res.json();
      renderCards(data);
      setOnline(true);
    } catch(e) {
      setOnline(false);
    }
  }

  function renderCards(data) {
    const grid = document.getElementById("grid");
    grid.innerHTML = "";
    Object.entries(data).forEach(([id, info]) => {
      const card = document.createElement("div");
      card.className = `card ${info.active ? "active" : ""}`;
      card.id = `card-${id}`;
      card.onclick = () => toggle(id);
      card.innerHTML = `
        <div class="card-header">
          <div>
            <div class="card-id">${id.replace("_"," ")}</div>
            <div class="card-name">${info.label}</div>
          </div>
          <div class="state-tag">${info.active ? t("on") : t("off")}</div>
        </div>
        <div class="toggle-row">
          <div class="pill"></div>
          <div class="toggle-label">${info.active ? t("turnOff") : t("turnOn")}</div>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  async function toggle(id) {
    try {
      const res = await fetch(`${API}/api/toggle/${id}`, { method: "POST" });
      const data = await res.json();
      updateCard(id, data);
      toast(`${data.label} → ${data.active ? t("on") : t("off")}`, "ok");
    } catch(e) {
      toast(lang === "nl" ? "Fout bij schakelen" : "Toggle failed", "err");
    }
  }

  function updateCard(id, data) {
    const card = document.getElementById(`card-${id}`);
    if (!card) return;
    card.className = `card ${data.active ? "active" : ""}`;
    card.querySelector(".state-tag").textContent = data.active ? t("on") : t("off");
    card.querySelector(".toggle-label").textContent = data.active ? t("turnOff") : t("turnOn");
  }

  async function allOff() {
    try {
      await fetch(`${API}/api/all_off`, { method: "POST" });
      fetchStatus();
      toast(lang === "nl" ? "Alles uitgeschakeld" : "All actuators off", "ok");
    } catch(e) {
      toast("Error", "err");
    }
  }

  function setOnline(online) {
    document.getElementById("conn-dot").className = `dot ${online ? "online" : ""}`;
    document.getElementById("conn-label").textContent = online ? t("connected") : t("offline");
  }

  let toastTimer;
  function toast(msg, type = "") {
    const el = document.getElementById("toast");
    el.textContent = msg;
    el.className = `show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.className = "", 2800);
  }

  setInterval(() => {
    if (document.getElementById("panel").style.display !== "none") fetchStatus();
  }, 5000);
</script>
</body>
</html>
