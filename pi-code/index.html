<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>medicijnkluis</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #12164a;
      --lav:    rgba(139,144,200,0.58);
      --lav-s:  rgba(139,144,200,0.38);
      --lav-h:  rgba(139,144,200,0.75);
      --lav-nb: #7b80bc;       /* solid for number-pad bg */
      --text:   #ffffff;
      --dim:    rgba(255,255,255,0.55);
      --sans:   'Raleway', sans-serif;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      background: var(--navy);
      color: var(--text);
      font-family: var(--sans);
      display: flex;
      flex-direction: column;
    }

    /* ── SCREENS ── */
    .screen {
      display: none;
      flex-direction: column;
      flex: 1;
      position: relative;
      /* padding-bottom keeps content above the back button */
      padding-bottom: 90px;
    }
    .screen.active { display: flex; }

    /* ── LANGUAGE SWITCHER ── */
    #lang-btn {
      position: fixed;
      top: 0; right: 0;
      width: 110px; height: 110px;   /* big touch target */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      cursor: pointer;
      z-index: 100;
    }

    .flag-nl, .flag-en {
      width: 68px; height: 45px;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
      flex-shrink: 0;
    }

    .flag-nl { display: flex; flex-direction: column; }
    .flag-nl .r { flex:1; }
    .flag-nl .r1 { background:#ae1c28; }
    .flag-nl .r2 { background:#ffffff; }
    .flag-nl .r3 { background:#21468b; }

    .flag-en { display: none; }

    #lang-btn.en .flag-nl { display: none; }
    #lang-btn.en .flag-en { display: block; }

    .lang-label {
      font-size: 0.78rem;
      color: var(--dim);
      text-align: center;
      line-height: 1.25;
      letter-spacing: 0.04em;
    }

    /* ── BACK BUTTON ── */
    .back-btn {
      position: absolute;
      bottom: 0; left: 0;
      width: 120px; height: 90px;   /* large touch target */
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .back-arrow {
      width: 0; height: 0;
      border-top:    24px solid transparent;
      border-bottom: 24px solid transparent;
      border-right:  40px solid rgba(255,255,255,0.75);
      transition: border-right-color .15s;
    }
    .back-btn:hover .back-arrow { border-right-color: #fff; }

    /* ════════════════════════════════════════
       SCREEN 1 – SPLASH
    ════════════════════════════════════════ */
    #splash {
      justify-content: center;
      cursor: pointer;
      padding: 3rem 3.5rem 90px;
    }
    .welcome-box {
      background: var(--lav);
      padding: 2rem 2.8rem 2.2rem;
      display: inline-block;
      margin-bottom: 3rem;
      max-width: 600px;
    }
    .welcome-box h1 {
      font-size: clamp(3.2rem, 8vw, 5rem);
      font-weight: 300;
      letter-spacing: 0.05em;
      line-height: 1;
      margin-bottom: 0.4rem;
    }
    .welcome-box p {
      font-size: clamp(1.2rem, 3vw, 1.7rem);
      font-weight: 400;
      letter-spacing: 0.1em;
    }
    .click-prompt {
      font-size: clamp(1.1rem, 2.5vw, 1.5rem);
      color: var(--dim);
      letter-spacing: 0.22em;
    }

    /* ════════════════════════════════════════
       SCREEN 2 – LOGIN CHOICE
    ════════════════════════════════════════ */
    #login-choice {
      justify-content: center;
      align-items: center;
    }
    .login-row {
      display: flex;
      gap: 2.5rem;
      justify-content: center;
      flex-wrap: wrap;
      padding: 2rem;
    }
    .login-tile {
      background: var(--lav);
      border: none;
      color: var(--text);
      font-family: var(--sans);
      font-size: 1.7rem;
      font-weight: 600;
      width: 220px;
      height: 200px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      line-height: 1.35;
      padding: 1.2rem;
      transition: background .2s;
    }
    .login-tile:hover { background: var(--lav-h); }

    /* ════════════════════════════════════════
       SCREEN 3 – BIRTHDAY
    ════════════════════════════════════════ */
    #birthday {
      padding: 1.5rem 2rem 90px;
      gap: 1rem;
    }
    .page-header {
      background: var(--lav);
      padding: 1rem 1.8rem;
      font-size: 1.7rem;
      font-weight: 400;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }
    .input-display {
      background: rgba(180,185,230,0.28);
      border: 1px solid rgba(255,255,255,0.18);
      padding: 0.7rem 1.2rem;
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      min-height: 3.5rem;
      max-width: 440px;
      align-self: flex-start;
    }
    .bd-body {
      display: flex;
      gap: 2rem;
      flex: 1;
      align-items: flex-start;
    }
    /* Month grid: 4×3 */
    .month-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      flex: 1;
    }
    .month-btn {
      background: var(--lav-s);
      border: 1px solid rgba(255,255,255,0.15);
      color: var(--text);
      font-family: var(--sans);
      font-size: 1.4rem;
      font-weight: 600;
      padding: 0.85rem 0.4rem;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: background .15s;
    }
    .month-btn:hover, .month-btn.sel { background: var(--lav-h); }
    /* Number pad */
    .numpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      width: 240px;
    }
    .num-btn {
      background: transparent;
      border: none;
      color: var(--text);
      font-family: var(--sans);
      font-size: 2rem;
      font-weight: 400;
      padding: 0.6rem 0.4rem;
      cursor: pointer;
      text-align: center;
      transition: color .15s;
    }
    .num-btn:hover { color: var(--dim); }
    .num-btn.wide {
      grid-column: span 2;
      background: var(--lav-s);
      font-size: 1.1rem;
      letter-spacing: 0.1em;
      border-radius: 2px;
    }
    .num-btn.wide:hover { background: var(--lav-h); }

    /* ════════════════════════════════════════
       SCREEN 4 – PINCODE
    ════════════════════════════════════════ */
    #pincode {
      justify-content: center;
      align-items: center;
      gap: 1.4rem;
      padding: 2rem 2rem 90px;
    }
    .pin-header {
      background: var(--lav);
      padding: 1rem 2rem;
      font-size: 1.7rem;
      font-weight: 400;
      letter-spacing: 0.05em;
      width: 100%;
      max-width: 480px;
    }
    .pin-display {
      background: rgba(180,185,230,0.28);
      border: 1px solid rgba(255,255,255,0.18);
      width: 100%;
      max-width: 480px;
      padding: 0.7rem 1.2rem;
      font-size: 2.4rem;
      letter-spacing: 0.35em;
      font-weight: 700;
      min-height: 4rem;
    }
    .pin-numpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      width: 100%;
      max-width: 360px;
    }
    .pin-btn {
      background: var(--lav-s);
      border: none;
      color: var(--text);
      font-family: var(--sans);
      font-size: 2rem;
      font-weight: 400;
      padding: 1rem 0.5rem;
      cursor: pointer;
      text-align: center;
      transition: background .15s;
      letter-spacing: 0.05em;
    }
    .pin-btn:hover { background: var(--lav-h); }
    .pin-btn.del {
      font-size: 1.1rem;
      letter-spacing: 0.05em;
      background: var(--lav-s);
    }
    .pin-btn.ok {
      font-size: 1.3rem;
      font-weight: 700;
      background: rgba(110,200,160,0.35);
    }
    .pin-btn.ok:hover { background: rgba(110,200,160,0.55); }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 1.5rem; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--lav);
      border: 1px solid rgba(255,255,255,0.2);
      font-size: 1.1rem; letter-spacing: 0.1em;
      padding: 0.8rem 1.8rem;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1);
      z-index: 200; white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.ok  { border-color: rgba(110,255,196,.5); color:#6effc4; }
    #toast.err { border-color: rgba(255,100,100,.4); color:#ff9999; }
  </style>
</head>
<body>

<!-- ── Language switcher ── -->
<div id="lang-btn" onclick="toggleLang()">
  <div class="flag-nl">
    <div class="r r1"></div>
    <div class="r r2"></div>
    <div class="r r3"></div>
  </div>
  <svg class="flag-en" viewBox="0 0 68 45" xmlns="http://www.w3.org/2000/svg">
    <rect width="68" height="45" fill="#012169"/>
    <path d="M0,0 L68,45 M68,0 L0,45" stroke="#fff" stroke-width="7"/>
    <path d="M0,0 L68,45 M68,0 L0,45" stroke="#C8102E" stroke-width="4.5"/>
    <path d="M34,0 V45 M0,22.5 H68" stroke="#fff" stroke-width="11"/>
    <path d="M34,0 V45 M0,22.5 H68" stroke="#C8102E" stroke-width="7"/>
  </svg>
  <div class="lang-label" id="lang-label">klik voor<br>engels</div>
</div>

<!-- ══════════════════════════════════
     SCREEN 1 – SPLASH
══════════════════════════════════ -->
<div class="screen active" id="splash" onclick="goTo('login-choice')">
  <div class="welcome-box">
    <h1 id="s-welcome">welkom</h1>
    <p id="s-sub">bij de medicijnkluis</p>
  </div>
  <div class="click-prompt" id="s-prompt">klik om door te gaan</div>
</div>

<!-- ══════════════════════════════════
     SCREEN 2 – LOGIN CHOICE
══════════════════════════════════ -->
<div class="screen" id="login-choice">
  <div class="login-row" style="flex:1;display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:2.5rem;padding:2rem;">
    <button class="login-tile" id="btn-handmatig" onclick="goTo('birthday')">inloggen<br>handmatig</button>
    <button class="login-tile" id="btn-qr"        onclick="goTo('pincode')">inloggen<br>Qr-code</button>
  </div>
  <div class="back-btn" onclick="goTo('splash')"><div class="back-arrow"></div></div>
</div>

<!-- ══════════════════════════════════
     SCREEN 3 – BIRTHDAY
══════════════════════════════════ -->
<div class="screen" id="birthday">
  <div class="page-header" id="bd-header">Vul uw geboortedatum in</div>
  <div class="input-display" id="bd-display">&nbsp;</div>

  <div class="bd-body">
    <!-- Month grid -->
    <div class="month-grid" id="month-grid">
      <!-- filled by JS -->
    </div>

    <!-- Number pad (day digits) -->
    <div class="numpad">
      <button class="num-btn" onclick="bdNum(1)">1</button>
      <button class="num-btn" onclick="bdNum(2)">2</button>
      <button class="num-btn" onclick="bdNum(3)">3</button>
      <button class="num-btn" onclick="bdNum(4)">4</button>
      <button class="num-btn" onclick="bdNum(5)">5</button>
      <button class="num-btn" onclick="bdNum(6)">6</button>
      <button class="num-btn" onclick="bdNum(7)">7</button>
      <button class="num-btn" onclick="bdNum(8)">8</button>
      <button class="num-btn" onclick="bdNum(9)">9</button>
      <button class="num-btn wide" id="bd-del"   onclick="bdDel()">wis</button>
      <button class="num-btn" onclick="bdNum(0)">0</button>
    </div>
  </div>

  <div class="back-btn" onclick="goTo('login-choice')"><div class="back-arrow"></div></div>
</div>

<!-- ══════════════════════════════════
     SCREEN 4 – PINCODE
══════════════════════════════════ -->
<div class="screen" id="pincode">
  <div class="pin-header" id="pin-header">Vul uw pincode in</div>
  <div class="pin-display" id="pin-display">&nbsp;</div>

  <div class="pin-numpad">
    <button class="pin-btn" onclick="pinNum(1)">1</button>
    <button class="pin-btn" onclick="pinNum(2)">2</button>
    <button class="pin-btn" onclick="pinNum(3)">3</button>
    <button class="pin-btn" onclick="pinNum(4)">4</button>
    <button class="pin-btn" onclick="pinNum(5)">5</button>
    <button class="pin-btn" onclick="pinNum(6)">6</button>
    <button class="pin-btn" onclick="pinNum(7)">7</button>
    <button class="pin-btn" onclick="pinNum(8)">8</button>
    <button class="pin-btn" onclick="pinNum(9)">9</button>
    <button class="pin-btn del" id="pin-del" onclick="pinDel()">wis</button>
    <button class="pin-btn" onclick="pinNum(0)">0</button>
    <button class="pin-btn ok"  onclick="pinOk()">OK</button>
  </div>

  <div class="back-btn" onclick="goTo('login-choice')"><div class="back-arrow"></div></div>
</div>

<div id="toast"></div>

<script>
  // ── State ──────────────────────────────────────────
  let lang = 'nl';
  let bdMonth = null;
  let bdDay   = '';
  let pinVal  = '';

  // ── Strings ────────────────────────────────────────
  const T = {
    nl: {
      langLabel:   'klik voor\n engels',
      welcome:     'welkom',
      sub:         'bij de medicijnkluis',
      prompt:      'klik om door te gaan',
      handmatig:   'inloggen\nhandmatig',
      qr:          'inloggen\nQr-code',
      bdHeader:    'Vul uw geboortedatum in',
      pinHeader:   'Vul uw pincode in',
      del:         'wis',
      months:      ['Jan','Feb','Mrt','Apr','Mei','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],
    },
    en: {
      langLabel:   'click for\ndutch',
      welcome:     'welcome',
      sub:         'to the medicine cabinet',
      prompt:      'click to continue',
      handmatig:   'log in\nmanually',
      qr:          'log in\nQr-code',
      bdHeader:    'Enter your date of birth',
      pinHeader:   'Enter your pin code',
      del:         'del',
      months:      ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],
    }
  };

  function t(k) { return T[lang][k]; }

  // ── Navigation ─────────────────────────────────────
  function goTo(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    // reset state when entering screens
    if (id === 'birthday') { bdMonth = null; bdDay = ''; updateBdDisplay(); buildMonthGrid(); }
    if (id === 'pincode')  { pinVal = ''; updatePinDisplay(); }
  }

  // ── Language ───────────────────────────────────────
  function toggleLang() {
    lang = lang === 'nl' ? 'en' : 'nl';
    const btn = document.getElementById('lang-btn');
    btn.classList.toggle('en', lang === 'en');
    applyStrings();
  }

  function applyStrings() {
    const s = T[lang];
    document.getElementById('lang-label').innerHTML    = s.langLabel.replace('\n','<br>');
    document.getElementById('s-welcome').textContent   = s.welcome;
    document.getElementById('s-sub').textContent       = s.sub;
    document.getElementById('s-prompt').textContent    = s.prompt;
    document.getElementById('btn-handmatig').innerHTML = s.handmatig.replace('\n','<br>');
    document.getElementById('btn-qr').innerHTML        = s.qr.replace('\n','<br>');
    document.getElementById('bd-header').textContent   = s.bdHeader;
    document.getElementById('pin-header').textContent  = s.pinHeader;
    document.getElementById('bd-del').textContent      = s.del;
    document.getElementById('pin-del').textContent     = s.del;
    buildMonthGrid();
    updateBdDisplay();
    updatePinDisplay();
  }

  // ── Birthday logic ─────────────────────────────────
  function buildMonthGrid() {
    const grid = document.getElementById('month-grid');
    grid.innerHTML = '';
    T[lang].months.forEach((m, i) => {
      const btn = document.createElement('button');
      btn.className = 'month-btn' + (bdMonth === i ? ' sel' : '');
      btn.textContent = m;
      btn.onclick = () => { bdMonth = i; buildMonthGrid(); updateBdDisplay(); };
      grid.appendChild(btn);
    });
  }

  function bdNum(n) {
    if (bdDay.length < 2) { bdDay += n; updateBdDisplay(); }
  }

  function bdDel() {
    if (bdDay.length > 0) { bdDay = bdDay.slice(0,-1); }
    else { bdMonth = null; }
    buildMonthGrid();
    updateBdDisplay();
  }

  function updateBdDisplay() {
    const el = document.getElementById('bd-display');
    const monthStr = bdMonth !== null ? T[lang].months[bdMonth] : '';
    const dayStr   = bdDay !== '' ? bdDay : '';
    const val = [monthStr, dayStr].filter(Boolean).join('  ');
    el.textContent = val || '\u00a0';
  }

  // ── Pincode logic ───────────────────────────────────
  function pinNum(n) {
    if (pinVal.length < 6) { pinVal += n; updatePinDisplay(); }
  }

  function pinDel() {
    pinVal = pinVal.slice(0,-1);
    updatePinDisplay();
  }

  function pinOk() {
    if (pinVal.length === 0) return;
    // Send to backend: POST /api/pin  { pin: "1234" }
    fetch('/api/pin', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pin: pinVal })
    })
    .then(r => r.json())
    .then(d => {
      if (d.ok) toast(lang === 'nl' ? 'Toegang verleend' : 'Access granted', 'ok');
      else      toast(lang === 'nl' ? 'Onjuiste pincode' : 'Incorrect pin', 'err');
      pinVal = ''; updatePinDisplay();
    })
    .catch(() => {
      // no backend connected yet – just show demo response
      toast(lang === 'nl' ? 'Demo: pincode ontvangen' : 'Demo: pin received', 'ok');
      pinVal = ''; updatePinDisplay();
    });
  }

  function updatePinDisplay() {
    const el = document.getElementById('pin-display');
    el.textContent = pinVal.length ? '● '.repeat(pinVal.length).trim() : '\u00a0';
  }

  // ── Toast ───────────────────────────────────────────
  let toastTimer;
  function toast(msg, type='') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'show ' + type;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.className = '', 2800);
  }

  // ── Init ────────────────────────────────────────────
  buildMonthGrid();
</script>
</body>
</html>
