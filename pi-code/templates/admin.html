<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Orders</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">
</head>
<body>
  <div class="admin-container">
    <header class="admin-header">
      <div class="header-left">
        <h1>Orders</h1>
        <div id="db-status" class="db-status">Checking DB...</div>
      </div>
      <div class="header-right">
        <button id="refresh-btn" class="btn btn-sm">Refresh</button>
        <button id="logout-btn" class="btn btn-outline">Logout</button>
      </div>
    </header>

    <main>
      <div class="data-toolbar">
        <div class="search-box">
          <input type="text" id="search-input" placeholder="Filter orders...">
        </div>
        <span id="row-count" class="row-count"></span>
      </div>

      <div id="orders-container" class="orders-list">
        <div class="loading">Loading orders...</div>
      </div>
    </main>
  </div>

  <!-- edit modal -->
  <div id="edit-modal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2>Edit Order</h2>
        <button class="modal-close" onclick="closeEdit()">&times;</button>
      </div>
      <div class="modal-body" id="edit-form"></div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeEdit()">Cancel</button>
        <button class="btn btn-primary" onclick="saveEdit()">Save</button>
      </div>
    </div>
  </div>

  <!-- delete confirmation modal -->
  <div id="delete-modal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2>Delete Order</h2>
        <button class="modal-close" onclick="closeDelete()">&times;</button>
      </div>
      <div class="modal-body">
        <p>Are you sure you want to delete order <strong id="delete-order-id"></strong>? This action cannot be undone.</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeDelete()">Cancel</button>
        <button class="btn btn-primary" style="background: var(--red); border-color: var(--red);" onclick="executeDelete()">Delete</button>
      </div>
    </div>
  </div>

  <script>
    let orders = [];
    let compartments = [1, 2, 3, 4];
    let statuses = ['pending', 'ready', 'completed', 'cancelled'];
    let expandedOrder = null; // track which order is expanded

    async function apiFetch(url, options = {}) {
      const res = await fetch(url, { credentials: 'same-origin', ...options });
      const ct = res.headers.get('content-type') || '';
      if (!ct.includes('json')) throw new Error('Session expired. Please log in again.');
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Request failed');
      return data;
    }

    async function checkDbStatus() {
      const el = document.getElementById('db-status');
      try {
        const data = await apiFetch('/api/db-status');
        el.textContent = data.status === 'connected' ? 'Connected' : 'Disconnected';
        el.className = "db-status " + (data.status === 'connected' ? 'connected' : 'disconnected');
      } catch (e) { el.textContent = 'Error'; el.className = 'db-status disconnected'; }
    }

    async function loadOptions() {
      try {
        const data = await apiFetch('/api/admin/options');
        if (data.compartments) compartments = data.compartments;
        if (data.statuses) statuses = data.statuses;
      } catch (e) { /* keep defaults */ }
    }

    async function loadOrders() {
      const container = document.getElementById('orders-container');
      try {
        const data = await apiFetch('/api/admin/orders');
        orders = data;
        renderOrders(orders);
        document.getElementById('row-count').textContent = orders.length + ' orders';
      } catch (err) {
        container.innerHTML = '<div class="error-state">' + err.message + '</div>';
      }
    }


    function statusBadge(status) {
      if (!status) return '<span class="status-badge empty">—</span>';
      const s = status.toLowerCase();
      return '<span class="status-badge ' + s + '">' + status + '</span>';
    }

    function toggleExpand(id) {
      expandedOrder = expandedOrder === id ? null : id;
      renderOrders(orders);
    }

    function renderOrders(data) {
      const container = document.getElementById('orders-container');
      if (!data.length) {
        container.innerHTML = '<div class="empty-state">No orders found</div>';
        return;
      }
      let html = '';
      data.forEach(function(row) {
        const isExpanded = expandedOrder === row.id;
        const compartment = row.compartment_number != null ? 'Compartment ' + row.compartment_number : '—';
        const dateStr = row.created_at ? new Date(row.created_at).toLocaleDateString('nl-NL', { day: '2-digit', month: 'short', year: 'numeric' }) : '—';

        // card header (always visible)
        html += '<div class="order-card' + (isExpanded ? ' expanded' : '') + '">';
        html += '<div class="order-card-header" onclick="toggleExpand(' + row.id + ')">';
        html += '<div class="order-card-main">';
        html += '<div class="order-id">' + escapeAttr(row.id) + '</div>';
        html += '<div class="order-card-meta">';
        html += statusBadge(row.status);
        html += '<span class="compartment-badge">' + compartment + '</span>';
        html += '<span class="order-date"> Created: ' + dateStr + '</span>';
        html += '</div></div>';
        html += '<div class="order-arrow">' + (isExpanded ? '▾' : '▸') + '</div>';
        html += '</div>';

        // expanded details
        if (isExpanded) {
          html += '<div class="order-card-details">';
          html += '<div class="details-grid">';
          html += '<div class="detail-row"><span class="detail-label">Product Name</span><span class="detail-value">' + escapeAttr(row.product_name) + '</span></div>';
          html += '<div class="detail-row"><span class="detail-label">Amount</span><span class="detail-value">' + escapeAttr(row.amount) + '</span></div>';
          html += '<div class="detail-row"><span class="detail-label">Created At</span><span class="detail-value">' + escapeAttr(row.created_at) + '</span></div>';
          html += '<div class="detail-row"><span class="detail-label">Updated At</span><span class="detail-value">' + escapeAttr(row.updated_at) + '</span></div>';
          html += '<div class="detail-row"><span class="detail-label">Birthdate</span><span class="detail-value">' + escapeAttr(row.birthdate || '—') + '</span></div>';
          html += '<div class="detail-row"><span class="detail-label">Pincode</span><span class="detail-value">' + escapeAttr(row.pincode || '—') + '</span></div>';
          html += '<div class="detail-row"><span class="detail-label">Order ID (external)</span><span class="detail-value detail-mono">' + escapeAttr(row.order_id || '—') + '</span></div>';
          html += '<div class="detail-row"><span class="detail-label">Product ID</span><span class="detail-value detail-mono">' + escapeAttr(row.product_id) + '</span></div>';
          html += '</div>';
          html += '<div class="order-actions">';
          html += '<button class="btn btn-ghost" onclick="openEdit(' + row.id + ')">Edit Status / Compartment</button>';
          html += '<button class="btn btn-ghost btn-danger" onclick="confirmDelete(' + row.id + ')">Delete</button>';
          html += '</div></div>';
        }
        html += '</div>';
      });
      container.innerHTML = html;
    }

    document.getElementById('search-input').addEventListener('input', function(e) {
      var q = e.target.value.toLowerCase();
      if (!q) { renderOrders(orders); return; }
      var filtered = orders.filter(function(row) {
        return Object.values(row).some(function(v) { return String(v).toLowerCase().includes(q); });
      });
      renderOrders(filtered);
      document.getElementById('row-count').textContent = filtered.length + ' of ' + orders.length;
    });

    document.getElementById('refresh-btn').addEventListener('click', loadOrders);

    document.getElementById('logout-btn').addEventListener('click', async function() {
      await fetch('/admin/logout', { method: 'POST', credentials: 'same-origin' });
      window.location.href = '/admin/login';
    });

    let currentEditId = null;
    let currentDeleteId = null;

    function openEdit(id) {
      const row = orders.find(o => o.id === id);
      if (!row) return;
      currentEditId = id;
      const formEl = document.getElementById('edit-form');

      const compartmentOptions = '<option value="">— Nog niet toegewezen —</option>' + compartments.map(function(c) {
        return '<option value="' + c + '"' + (row.compartment_number == c ? ' selected' : '') + '>' + c + '</option>';
      }).join('');

      const statusOptions = statuses.map(function(s) {
        return '<option value="' + s + '"' + (row.status === s ? ' selected' : '') + '>' + s + '</option>';
      }).join('');

      formEl.innerHTML =
        '<div class="form-group"><label>Compartment Number</label>' +
        '<select id="edit-compartment_number">' + compartmentOptions + '</select></div>' +
        '<div class="form-group"><label>Status</label>' +
        '<select id="edit-status">' + statusOptions + '</select></div>';
      document.getElementById('edit-modal').classList.remove('hidden');
    }

    function closeEdit() {
      document.getElementById('edit-modal').classList.add('hidden');
      currentEditId = null;
    }

    async function saveEdit() {
      if (currentEditId === null) return;
      const compartmentVal = document.getElementById('edit-compartment_number').value;
      const compartment_number = compartmentVal === '' ? null : parseInt(compartmentVal, 10);
      const status = document.getElementById('edit-status').value;
      try {
        await apiFetch('/api/admin/orders/' + currentEditId, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ compartment_number: compartment_number, status: status })
        });
        closeEdit();
        loadOrders();
      } catch (err) {
        alert(err.message);
      }
    }

    function confirmDelete(id) {
      currentDeleteId = id;
      document.getElementById('delete-order-id').textContent = id;
      document.getElementById('delete-modal').classList.remove('hidden');
    }

    function closeDelete() {
      document.getElementById('delete-modal').classList.add('hidden');
      currentDeleteId = null;
    }

    async function executeDelete() {
      if (currentDeleteId === null) return;
      try {
        await apiFetch('/api/admin/orders/' + currentDeleteId, {
          method: 'DELETE'
        });
        closeDelete();
        loadOrders();
      } catch (err) {
        alert(err.message);
      }
    }

    function escapeAttr(val) {
      if (val === null || val === undefined) return '';
      if (typeof val === 'object') val = JSON.stringify(val);
      return String(val).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    checkDbStatus();
    loadOptions();
    loadOrders();
  </script>
</body>
</html>
