<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="google" content="notranslate">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='admin_login.css') }}">
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <h1>Admin Login</h1>
      <form id="login-form">
        <div class="form-group">
          <label for="pincode">Admin PIN code</label>
          <input type="password" id="pincode" name="pincode" maxlength="6" inputmode="numeric" autocomplete="one-time-code" placeholder="6-digit PIN" autofocus>
        </div>
        <div id="error-message" class="error-message"></div>
        <button type="submit" id="login-btn">Login</button>
      </form>
      <div class="back-link">
        <a href="/">← Back to Medicine Vault</a>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const pincode = document.getElementById('pincode').value;
      const errorMsg = document.getElementById('error-message');
      const loginBtn = document.getElementById('login-btn');

      loginBtn.disabled = true;
      loginBtn.textContent = 'Logging in...';
      errorMsg.textContent = '';

      try {
        const response = await fetch('/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pincode })
        });

        const data = await response.json();

        if (response.ok) {
          window.location.href = '/admin';
        } else {
          errorMsg.textContent = data.error || 'Login failed';
          loginBtn.disabled = false;
          loginBtn.textContent = 'Login';
        }
      } catch (err) {
        errorMsg.textContent = 'Network error. Please try again.';
        loginBtn.disabled = false;
        loginBtn.textContent = 'Login';
      }
    });
  </script>
</body>
</html>
